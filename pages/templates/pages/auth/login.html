{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaMarket — Iniciar sesión</title>
  <link rel="stylesheet" href="{% static 'pages/css/main.css' %}" />
  <style>
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: var(--gray, #a8c0d6);
      font-size: 12px;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray2, #1e3352);
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      background: #fff;
      color: #1f2937;
      font-size: 14.5px;
      font-weight: 600;
      text-decoration: none;
      transition: .2s ease;
    }
    .btn-google:hover { background: #f1f5f9; transform: translateY(-1px); }
  </style>
</head>
<body class="login-body">
  <div class="login-bg">
    <div class="login-glow glow-1"></div>
    <div class="login-glow glow-2"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon-lg">N</div>
        <span class="login-brand">Nexa<b>-Market</b></span>
      </div>

      <h2 class="login-title">Bienvenido de vuelta</h2>
      <p class="login-subtitle">Ingresa a tu panel de gestión</p>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-error">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post" class="login-form">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="username">Usuario</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="Tu nombre de usuario"
              required
              autocomplete="username"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Tu contraseña"
              required
              autocomplete="current-password"
            />
            <button type="button" class="toggle-password" id="togglePwd" aria-label="Mostrar contraseña">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-login">Iniciar sesión →</button>
      </form>

      <div class="login-divider"><span>o</span></div>

      <a href="{% url 'google_login' %}" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        Continuar con Google
      </a>

      <p class="login-footer">© 2026 Nexalyze · NexaMarket</p>
    </div>
  </div>

  <script src="{% static 'pages/js/main.js' %}"></script>
  <script>
    document.getElementById('togglePwd').addEventListener('click', function() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
