{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conectando con Google…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #eef3fa;
      color: #0f1f33;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #e3eaf3;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(15,31,51,.10);
      padding: 40px 36px;
      text-align: center;
      max-width: 380px;
    }
    .spinner {
      width: 42px; height: 42px;
      margin: 0 auto 18px;
      border: 4px solid #e3eaf3;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 18px; margin-bottom: 6px; }
    p { font-size: 14px; color: #5c6b80; }
    .error { color: #c92a2a; }
    a { color: #2563eb; font-weight: 600; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <h1>Conectando con Google…</h1>
      <p>Un momento, estamos abriendo tu sesión.</p>
    </div>
    <div id="error" class="hidden">
      <h1 class="error">No se pudo iniciar sesión</h1>
      <p id="error-msg"></p>
      <p style="margin-top:14px"><a href="{% url 'login' %}">← Volver a intentarlo</a></p>
    </div>
  </div>

  <script>
    (function () {
      function fail(msg) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('error-msg').textContent = msg;
      }

      // Supabase devuelve los tokens en el fragmento: #access_token=...&...
      const params = new URLSearchParams(window.location.hash.slice(1));
      const token = params.get('access_token');
      if (!token) {
        fail(params.get('error_description') || 'Google no devolvió un token de acceso.');
        return;
      }

      fetch("{% url 'supabase_session' %}", {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': '{{ csrf_token }}',
        },
        body: JSON.stringify({ access_token: token }),
      })
        .then((r) => r.json())
        .then((d) => {
          if (d.ok) {
            window.location.replace(d.next);
          } else {
            fail(d.error || 'Error desconocido al validar la sesión.');
          }
        })
        .catch(() => fail('No se pudo contactar al servidor.'));
    })();
  </script>
</body>
</html>
